name: Connectakt
options:
  bundleIdPrefix: com.ericerwin
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  xcodeVersion: "16"
  createIntermediateGroups: true
  defaultConfig: Debug

configs:
  Debug: debug
  Release: release

targets:
  Connectakt:
    type: application
    platform: [iOS, macOS]
    sources:
      - path: Connectakt
        excludes:
          - "**/*.md"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ericerwin.connectakt
        SWIFT_VERSION: "5.9"
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        ENABLE_HARDENED_RUNTIME: YES
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_NSHumanReadableCopyright: ""
        INFOPLIST_KEY_CFBundleDisplayName: "Connectakt"
        INFOPLIST_KEY_LSMultipleInstancesProhibited: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "Connectakt records audio from your Digitakt via USB to capture samples."
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: FMDT2KGY3Z
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        "CODE_SIGN_ENTITLEMENTS[sdk=iphoneos*]": Connectakt/Connectakt_iOS.entitlements
        "CODE_SIGN_ENTITLEMENTS[sdk=iphonesimulator*]": Connectakt/Connectakt_iOS.entitlements
        "CODE_SIGN_ENTITLEMENTS[sdk=macosx*]": Connectakt/Connectakt.entitlements
        # IOUSBHost.framework is macOS-only; iOS builds ignore this flag
        "OTHER_LDFLAGS[sdk=macosx*]": "$(inherited) -framework IOUSBHost"
    dependencies:
      - target: ConnektaktAU
        embed: true
        platformFilter: iOS
    configs:
      Debug:
        DEBUG_INFORMATION_FORMAT: dwarf
      Release:
        DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
        SWIFT_OPTIMIZATION_LEVEL: "-O"

  ConnektaktAU:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: ConnektaktAU
        excludes:
          - "**/*.md"
          - "Info.plist"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ericerwin.connectakt.au
        PRODUCT_NAME: ConnektaktAU
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: ConnektaktAU/Info.plist
        APPLICATION_EXTENSION_API_ONLY: YES
        DEVELOPMENT_TEAM: FMDT2KGY3Z
        CODE_SIGN_STYLE: Automatic
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks @executable_path/../../Frameworks"
        SKIP_INSTALL: YES

  ConnektaktTests:
    type: bundle.unit-test
    platform: iOS
    sources: ConnektaktTests
    dependencies:
      - target: Connectakt_iOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ericerwin.connectakt.tests
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: YES
